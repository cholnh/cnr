server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://cnr-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE (Server-Sent Events) endpoints
    location ~ ^/v1/game/(location|events)/subscribe$ {
        proxy_pass http://cnr-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE: disable buffering so events are streamed immediately
        proxy_buffering off;
        proxy_cache off;

        # Keep connection alive for long-running SSE streams
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;

        # SSE requires HTTP/1.1
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
